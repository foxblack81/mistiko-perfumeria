<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Mistiko | PDFs de precios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050607;
      --panel: #101214;
      --line: rgba(216, 221, 226, .2);
      --text: #f4f6f7;
      --muted: #aeb6bd;
      --silver: #d8dde2;
      --danger: #b53b47;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100svh;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(216, 221, 226, .16), transparent 32%),
        linear-gradient(145deg, #020303 0%, #111417 46%, #050607 100%);
      font-family: Montserrat, Arial, sans-serif;
    }

    main {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0 72px;
    }

    a { color: inherit; }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 28px;
    }

    h1, h2 {
      margin: 0;
      font-family: Cinzel, Georgia, serif;
      letter-spacing: .04em;
    }

    p { color: var(--muted); line-height: 1.65; }

    .panel {
      border: 1px solid var(--line);
      background: linear-gradient(145deg, rgba(20, 23, 26, .94), rgba(8, 9, 10, .86));
      box-shadow: 0 28px 80px rgba(0, 0, 0, .42);
      padding: 28px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, .82fr) minmax(280px, .55fr);
      gap: 22px;
      align-items: start;
    }

    label {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
      color: var(--silver);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
      font-size: .78rem;
    }

    input {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .06);
      color: var(--text);
      padding: 0 14px;
      font: inherit;
    }

    input[type="file"] {
      padding: 12px;
    }

    button, .button {
      min-height: 48px;
      border: 1px solid rgba(216, 221, 226, .28);
      background: linear-gradient(135deg, #555d64, #aeb6bd);
      color: #fff;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 0 18px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    button.secondary {
      background: transparent;
      color: var(--silver);
    }

    button.danger {
      background: var(--danger);
    }

    .hidden { display: none; }

    .status {
      min-height: 24px;
      color: var(--silver);
      font-weight: 700;
    }

    .pdf-list {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .pdf-item {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .05);
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .pdf-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    @media (max-width: 760px) {
      .grid, .topbar {
        grid-template-columns: 1fr;
        display: grid;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <div>
        <h1>Admin Mistiko</h1>
        <p>Publica y administra los PDFs de precios.</p>
      </div>
      <a class="button" href="/catalogo">Ver catalogo publicado</a>
    </div>

    <section class="grid">
      <form class="panel" id="loginForm">
        <h2>Acceso</h2>
        <p>Ingresa con el usuario autorizado para gestionar los PDFs.</p>
        <label>Usuario
          <input id="user" autocomplete="username" required>
        </label>
        <label>Clave
          <input id="pass" type="password" autocomplete="current-password" required>
        </label>
        <button type="submit">Entrar</button>
      </form>

      <form class="panel hidden" id="uploadForm">
        <h2>Subir PDF</h2>
        <p>El archivo quedara disponible publicamente en la pagina de catalogo.</p>
        <label>Titulo
          <input id="title" placeholder="Lista de precios mayo 2026" required>
        </label>
        <label>Archivo PDF
          <input id="pdf" type="file" accept="application/pdf,.pdf" required>
        </label>
        <button type="submit">Publicar PDF</button>
        <button class="secondary" id="logout" type="button">Cerrar sesion</button>
        <p class="status" id="status"></p>
      </form>
    </section>

    <section class="panel" style="margin-top:22px;">
      <h2>PDFs publicados</h2>
      <div class="pdf-list" id="pdfList"></div>
    </section>
  </main>

  <script>
    const loginForm = document.querySelector("#loginForm");
    const uploadForm = document.querySelector("#uploadForm");
    const statusBox = document.querySelector("#status");
    const listBox = document.querySelector("#pdfList");
    const authKey = "mistikoAdminAuth";

    const getAuth = () => sessionStorage.getItem(authKey) || "";
    const setLoggedIn = (loggedIn) => {
      loginForm.classList.toggle("hidden", loggedIn);
      uploadForm.classList.toggle("hidden", !loggedIn);
    };

    const formatSize = (size) => {
      if (!size) return "";
      const mb = Number(size) / 1024 / 1024;
      return `${mb.toFixed(2)} MB`;
    };

    async function loadPdfs() {
      const response = await fetch("/api/pdfs");
      const data = await response.json();
      listBox.innerHTML = "";

      if (!data.items.length) {
        listBox.innerHTML = "<p>No hay PDFs publicados todavia.</p>";
        return;
      }

      data.items.forEach((item) => {
        const article = document.createElement("article");
        article.className = "pdf-item";
        article.innerHTML = `
          <strong>${item.title}</strong>
          <span>${item.filename} ${formatSize(item.size)}</span>
          <div class="pdf-actions">
            <a class="button" href="${item.url}" target="_blank" rel="noopener">Abrir</a>
            <button class="danger" type="button" data-delete="${item.id}">Eliminar</button>
          </div>
        `;
        listBox.appendChild(article);
      });
    }

    loginForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const user = document.querySelector("#user").value.trim();
      const pass = document.querySelector("#pass").value;
      sessionStorage.setItem(authKey, `Basic ${btoa(`${user}:${pass}`)}`);
      setLoggedIn(true);
      statusBox.textContent = "Sesion iniciada.";
    });

    uploadForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      statusBox.textContent = "Subiendo PDF...";

      const formData = new FormData();
      formData.append("title", document.querySelector("#title").value.trim());
      formData.append("pdf", document.querySelector("#pdf").files[0]);

      const response = await fetch("/api/admin/pdfs", {
        method: "POST",
        headers: { Authorization: getAuth() },
        body: formData
      });
      const data = await response.json();

      if (!response.ok) {
        statusBox.textContent = data.error || "No se pudo publicar el PDF.";
        return;
      }

      uploadForm.reset();
      statusBox.textContent = "PDF publicado correctamente. Ya puedes verlo en /catalogo.";
      await loadPdfs();
    });

    listBox.addEventListener("click", async (event) => {
      const button = event.target.closest("[data-delete]");
      if (!button) return;
      if (!confirm("Eliminar este PDF de precios?")) return;

      const response = await fetch(`/api/admin/pdfs/${button.dataset.delete}`, {
        method: "DELETE",
        headers: { Authorization: getAuth() }
      });
      if (!response.ok) {
        alert("No se pudo eliminar. Revisa el usuario y la clave.");
        return;
      }
      await loadPdfs();
    });

    document.querySelector("#logout").addEventListener("click", () => {
      sessionStorage.removeItem(authKey);
      setLoggedIn(false);
    });

    setLoggedIn(Boolean(getAuth()));
    loadPdfs();
  </script>
</body>
</html>
