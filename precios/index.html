<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Precios Mistiko | PDFs publicados</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050607;
      --panel: #101214;
      --line: rgba(216, 221, 226, .2);
      --text: #f4f6f7;
      --muted: #aeb6bd;
      --silver: #d8dde2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100svh;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(216, 221, 226, .16), transparent 32%),
        linear-gradient(145deg, #020303 0%, #111417 46%, #050607 100%);
      font-family: Montserrat, Arial, sans-serif;
    }

    main {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0 72px;
    }

    h1 {
      margin: 0;
      font-family: Cinzel, Georgia, serif;
      font-size: clamp(2.4rem, 7vw, 5rem);
      line-height: 1;
    }

    p { color: var(--muted); line-height: 1.65; }

    a {
      color: inherit;
      text-decoration: none;
    }

    .button {
      min-height: 48px;
      border: 1px solid rgba(216, 221, 226, .28);
      background: linear-gradient(135deg, #555d64, #aeb6bd);
      color: #fff;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 0 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .panel {
      border: 1px solid var(--line);
      background: linear-gradient(145deg, rgba(20, 23, 26, .94), rgba(8, 9, 10, .86));
      box-shadow: 0 28px 80px rgba(0, 0, 0, .42);
      padding: 28px;
    }

    .top {
      display: grid;
      gap: 16px;
      margin-bottom: 24px;
    }

    .pdf-list {
      display: grid;
      gap: 14px;
    }

    .pdf-item {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .05);
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
  </style>
</head>
<body>
  <main>
    <section class="top">
      <a href="/">Volver al inicio</a>
      <h1>PDFs de precios</h1>
      <p>Consulta las listas de precios publicadas por Perfumeria Mistiko.</p>
    </section>

    <section class="panel">
      <div class="pdf-list" id="pdfList"><p>Cargando precios...</p></div>
    </section>
  </main>

  <script>
    const listBox = document.querySelector("#pdfList");
    const formatSize = (size) => {
      if (!size) return "";
      const mb = Number(size) / 1024 / 1024;
      return `${mb.toFixed(2)} MB`;
    };

    async function loadPdfs() {
      const response = await fetch("/api/pdfs");
      const data = await response.json();
      listBox.innerHTML = "";

      if (!data.items.length) {
        listBox.innerHTML = "<p>No hay PDFs publicados todavía.</p>";
        return;
      }

      data.items.forEach((item) => {
        const article = document.createElement("article");
        article.className = "pdf-item";
        article.innerHTML = `
          <strong>${item.title}</strong>
          <span>${item.filename} ${formatSize(item.size)}</span>
          <div class="actions">
            <a class="button" href="${item.url}" target="_blank" rel="noopener">Abrir PDF</a>
            <a class="button" href="${item.url}" download>Descargar</a>
          </div>
        `;
        listBox.appendChild(article);
      });
    }

    loadPdfs().catch(() => {
      listBox.innerHTML = "<p>No se pudieron cargar los PDFs en este momento.</p>";
    });
  </script>
</body>
</html>
