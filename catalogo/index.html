<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Catalogo Mistiko | PDFs de precios</title>
  <meta name="description" content="Catalogos y PDFs de precios publicados por Perfumeria Mistiko en Palmira, Valle del Cauca.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050607;
      --panel: #101214;
      --line: rgba(216, 221, 226, .22);
      --text: #f4f6f7;
      --muted: #aeb6bd;
      --silver: #d8dde2;
      --metal: linear-gradient(135deg, #42474d 0%, #f4f6f7 34%, #8f989f 62%, #ffffff 78%, #555d64 100%);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100svh;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 0%, rgba(216, 221, 226, .18), transparent 34%),
        radial-gradient(circle at 88% 10%, rgba(143, 152, 159, .16), transparent 30%),
        linear-gradient(145deg, #020303 0%, #111417 46%, #050607 100%);
      font-family: Montserrat, Arial, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(216, 221, 226, .055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(216, 221, 226, .04) 1px, transparent 1px);
      background-size: 72px 72px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, .45), transparent 80%);
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0 72px;
      position: relative;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .top {
      display: grid;
      gap: 16px;
      margin-bottom: 28px;
    }

    .top a {
      color: var(--silver);
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-size: .82rem;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      font-family: Cinzel, Georgia, serif;
      line-height: 1.06;
      letter-spacing: .03em;
    }

    h1 {
      color: var(--silver);
      font-size: clamp(2.5rem, 8vw, 5.8rem);
    }

    p {
      color: var(--muted);
      line-height: 1.65;
      margin: 0;
    }

    .lead {
      max-width: 760px;
      font-size: 1.05rem;
    }

    .panel {
      border: 1px solid var(--line);
      background: linear-gradient(145deg, rgba(20, 23, 26, .94), rgba(8, 9, 10, .86));
      box-shadow: 0 28px 80px rgba(0, 0, 0, .42);
      padding: 28px;
    }

    .pdf-list {
      display: grid;
      gap: 28px;
    }

    .pdf-item {
      display: grid;
      gap: 16px;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at 16% 0%, rgba(216, 221, 226, .13), transparent 34%),
        linear-gradient(145deg, rgba(20, 23, 26, .96), rgba(6, 7, 8, .88));
      padding: 24px;
    }

    .pdf-item strong {
      color: var(--silver);
      font-family: Cinzel, Georgia, serif;
      font-size: clamp(1.45rem, 3vw, 2.4rem);
      line-height: 1.1;
    }

    .pdf-meta {
      color: var(--muted);
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-size: .82rem;
    }

    .pdf-viewer {
      width: 100%;
      min-height: 78svh;
      border: 1px solid var(--line);
      background: #070809;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .button {
      min-height: 48px;
      border: 1px solid rgba(216, 221, 226, .28);
      background: var(--metal);
      color: #070809;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 0 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .button.dark {
      color: #fff;
      background: linear-gradient(135deg, #555d64, #202428);
    }

    @media (max-width: 720px) {
      main {
        width: min(100% - 24px, 1180px);
        padding-top: 28px;
      }

      .panel,
      .pdf-item {
        padding: 18px;
      }

      .pdf-viewer {
        min-height: 64svh;
      }

      .actions .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="top">
      <a href="/">Volver al inicio</a>
      <h1>Catalogo de precios</h1>
      <p class="lead">Consulta los catalogos oficiales de Perfumeria Mistiko. Puedes verlos abiertos en esta pagina o descargar cada PDF para revisarlo con calma.</p>
    </section>

    <section class="panel">
      <div class="pdf-list" id="pdfList"><p>Cargando catalogos...</p></div>
    </section>
  </main>

  <script>
    const listBox = document.querySelector("#pdfList");

    const formatSize = (size) => {
      if (!size) return "";
      const mb = Number(size) / 1024 / 1024;
      return `${mb.toFixed(2)} MB`;
    };

    async function loadPdfs() {
      const response = await fetch("/api/pdfs");
      const data = await response.json();
      listBox.innerHTML = "";

      if (!data.items.length) {
        listBox.innerHTML = "<p>No hay catalogos publicados todavia.</p>";
        return;
      }

      data.items.forEach((item) => {
        const article = document.createElement("article");
        article.className = "pdf-item";
        article.innerHTML = `
          <strong>${item.title}</strong>
          <span class="pdf-meta">${item.filename} ${formatSize(item.size)}</span>
          <iframe class="pdf-viewer" src="${item.url}" title="${item.title} PDF"></iframe>
          <div class="actions">
            <a class="button dark" href="${item.url}" target="_blank" rel="noopener">Abrir PDF</a>
            <a class="button" href="${item.url}" download>Descargar PDF</a>
          </div>
        `;
        listBox.appendChild(article);
      });
    }

    loadPdfs().catch(() => {
      listBox.innerHTML = "<p>No se pudieron cargar los catalogos en este momento.</p>";
    });
  </script>
</body>
</html>
